      - name: Restore ONNX Runtime ccache with ImageVersion and toolchain hash matched (macOS universal)
        id: restore-ort-ccache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:

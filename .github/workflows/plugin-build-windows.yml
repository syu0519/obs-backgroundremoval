# date: 2026-03-30

on:
  workflow_call:
    inputs:
      environment:
        description: The environment name for the build jobs, or empty string for no environment
        required: false
        type: string
        default: ''
      pluginbinary-retention-days:
        description: Days to retain plugin binary artifacts in GitHub Actions
        required: false
        type: number
        default: 7
      VCPKG_BINARY_SOURCES:
        description: VCPKG_BINARY_SOURCES environment variable for the build jobs
        required: false
        type: string
        default: ''

jobs:
  build-windows-x64:
    name: Build Plugin for Windows x64

    environment: ${{ inputs.environment }}
    runs-on: windows-2022
    timeout-minutes: 180

    permissions:
      contents: read

    env:
      CLEAN_PWSH_ENV: '${{ github.workspace }}\.github\scripts\clean-env-windows.ps1'
      CMAKE_PATH: 'C:\Program Files\CMake\bin;C:\Program Files\Ninja'
      CREDENTIAL_GIT_CONFIG_PARAMETERS: "'url.https://x-access-token:${{ github.token }}@github.com/.insteadOf=https://github.com/'"
      GIT_PATH: 'C:\Program Files\Git\cmd'
      MINIMAL_PATH: 'C:\Windows\System32\WindowsPowerShell\v1.0;C:\Windows\System32;C:\Windows'
      ORT_CCACHE_DIR: '${{ github.workspace }}\.ort_ccache'
      VCPKG_BINARY_SOURCES: '${{ inputs.VCPKG_BINARY_SOURCES }}'
      VCPKG_ROOT: '${{ github.workspace }}\vcpkg'

    steps:
      - name: Enable Windows long path
        shell: pwsh
        run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1

      - name: Output Image Metadata
        id: image-metadata
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: echo "ImageVersion=$ImageVersion" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python for build requirements
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ${{ github.workspace }}/.python-version
          pip-install: -r ${{ github.workspace }}/requirements-build.txt

      - name: Set up ccache
        id: setup-ccache
        uses: ./.github/actions/setup-ccache

      - name: Extract plugin buildspec
        id: buildspec
        uses: ./.github/actions/extract-buildspec

      - name: Extract vcpkg configuration
        id: vcpkg-configuration
        uses: ./.github/actions/extract-vcpkg-configuration

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ steps.vcpkg-configuration.outputs.DEFAULT_REGISTRY_BASELINE }}
          persist-credentials: false
          path: "${{ env.VCPKG_ROOT }}"
          filter: "blob:none"

      - name: Run bootstrap-vcpkg.bat
        shell: pwsh
        env:
          GIT_CONFIG_PARAMETERS: '${{ env.CREDENTIAL_GIT_CONFIG_PARAMETERS }}'
          PATH: '${{ env.GIT_PATH }};${{ env.MINIMAL_PATH }}'
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . "$env:CLEAN_PWSH_ENV"

          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"  -disableMetrics

      - name: Install dependencies from vcpkg (Windows x64)
        shell: pwsh
        env:
          GIT_CONFIG_PARAMETERS: '${{ env.CREDENTIAL_GIT_CONFIG_PARAMETERS }}'
          PATH: '${{ env.GIT_PATH }};${{ env.MINIMAL_PATH }}'
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . "$env:CLEAN_PWSH_ENV"

          & "$env:VCPKG_ROOT\vcpkg" install --x-install-root=.\.deps_vendor\vcpkg_installed --triplet=x64-windows-static-md-obs

      - name: Download dependencies (Windows)
        shell: pwsh
        env:
          PATH: '${{ env.CMAKE_PATH }};${{ env.MINIMAL_PATH }}'
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . "$env:CLEAN_PWSH_ENV"

          cmake -P ./scripts/download_deps.cmake

      - name: Build libobs (Windows)
        shell: pwsh
        env:
          GIT_CONFIG_PARAMETERS: '${{ env.CREDENTIAL_GIT_CONFIG_PARAMETERS }}'
          PATH: '${{ env.CMAKE_PATH }};${{ env.MINIMAL_PATH }}'
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . "$env:CLEAN_PWSH_ENV"

          ./scripts/build_libobs_windows.ps1

      - name: Compute Toolchain Hash of ONNX Runtime (Windows x64)
        id: ort-toolchain
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          HASH: ${{ hashFiles('data/models/required_operators_and_types.with_runtime_opt.config', 'scripts/build_ort_windows_x64.ps1') }}
        run: |
          echo "HASH=$HASH" >> "$GITHUB_OUTPUT"

      - name: Restore ONNX Runtime ccache generated by ORT CI (Windows x64)
        id: restore-ort-ccache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.ORT_CCACHE_DIR }}
          key: ort-ccache-${{ runner.os }}-x64-${{ steps.image-metadata.outputs.ImageVersion }}-${{ steps.ort-toolchain.outputs.HASH }}-${{ steps.setup-ccache.outputs.VERSION }}
          restore-keys: |
            ort-ccache-${{ runner.os }}-x64-${{ steps.image-metadata.outputs.ImageVersion }}-${{ steps.ort-toolchain.outputs.HASH }}-
            ort-ccache-${{ runner.os }}-x64-${{ steps.image-metadata.outputs.ImageVersion }}-

      - name: Build ONNX Runtime (Windows x64)
        shell: pwsh
        env:
          CCACHE_BASEDIR: '${{ github.workspace }}'
          CCACHE_COMPILERCHECK: 'content'
          CCACHE_COMPRESS: 'true'
          CCACHE_DIR: '${{ env.ORT_CCACHE_DIR }}'
          CCACHE_DIRECT: 'true'
          CCACHE_NODEPEND: 'true'
          CCACHE_SLOPPINESS: 'include_file_ctime,include_file_mtime,time_macros,pch_defines'
          GIT_CONFIG_PARAMETERS: '${{ env.CREDENTIAL_GIT_CONFIG_PARAMETERS }}'
          PATH: '${{ env.CMAKE_PATH }};${{ env.GIT_PATH }};${{ env.MINIMAL_PATH }}'
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . "$env:CLEAN_PWSH_ENV"

          ./scripts/build_ort_windows_x64.ps1

      - name: Show ccache stats for ONNX Runtime
        if: always()
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          CCACHE_DIR: '${{ env.ORT_CCACHE_DIR }}'
        continue-on-error: true
        run: |
          printf '## Ccache stats for ONNX Runtime\n\n```\n%s```\n' "$(ccache -s)" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.CMAKE_PATH }};${{ env.MINIMAL_PATH }}'
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . "$env:CLEAN_PWSH_ENV"

          cmake --preset windows-ci-x64

      - name: Build (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.CMAKE_PATH }};${{ env.MINIMAL_PATH }}'
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . "$env:CLEAN_PWSH_ENV"

          cmake --build --preset windows-ci-x64

      - name: Package (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.CMAKE_PATH }};${{ env.MINIMAL_PATH }}'
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . "$env:CLEAN_PWSH_ENV"

          .\scripts\package_plugin_windows.ps1 -Target x64

      - name: Upload Plugin Binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.buildspec.outputs.NAME }}-pluginbinary-windows-x64-${{ github.run_id }}
          path: |
            release/*-windows-x64.zip
            release/*-windows-x64-pdb.zip
          if-no-files-found: error
          retention-days: ${{ inputs.pluginbinary-retention-days }}

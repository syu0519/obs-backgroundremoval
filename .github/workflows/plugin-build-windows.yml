# file: .github/workflows/plugin-build-windows.yml
# author: Kaito Udagawa <umireon@kaito.tokyo>
# version: 1.1.0
# date: 2026-04-04

on:
  workflow_call:
    inputs:
      environment:
        description: The environment name for the build jobs, or empty string for no environment
        required: false
        type: string
        default: ''
      VCPKG_BINARY_SOURCES:
        description: VCPKG_BINARY_SOURCES environment variable for the build jobs
        required: true
        type: string
      vcpkg-version:
        description: The version of vcpkg to clone.
        required: true
        type: string
      ort-version:
        description: The ONNX Runtime version.
        required: true
        type: string

permissions: {}

jobs:
  build-windows-x64:
    environment: ${{ inputs.environment }}
    runs-on: windows-2022
    timeout-minutes: 180

    permissions:
      contents: read

    env:
      CLEAN_PWSH_ENV: '${{ github.workspace }}\.github\scripts\clean-env-windows.ps1'
      FILTERED_PATH: 'C:\ProgramData\chocolatey\bin;C:\Program Files\CMake\bin;C:\Program Files\Git\cmd;C:\Windows\System32\WindowsPowerShell\v1.0;C:\Windows\System32;C:\Windows'
      ORT_CCACHE_DIR: '${{ github.workspace }}\.ort_ccache'
      ROOT_VCPKG_ROOT: '${{ github.workspace }}\vcpkg'

    steps:
      - name: Enable Windows long path
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1

      - name: Output Image Metadata
        id: image-metadata
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          echo "ImageVersion=$ImageVersion" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python for build requirements
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
          pip-install: -r requirements-build.txt

      # ASSERT: The directory of python3 executable is always prepended to the PATH specified in the env section.

      - name: Set up ccache
        id: setup-ccache
        uses: ./.github/actions/setup-ccache

      # ASSERT: The directory of ccache executable is prepended to the PATH even if PATH is overridden in the env section.

      - name: Print CMake version on Windows
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          . $env:CLEAN_PWSH_ENV
          cmake --version

      - name: Print Ninja version on Windows
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          . $env:CLEAN_PWSH_ENV
          ninja --version

      - name: Print vswhere information for Visual Studio 2022 on Windows
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          . $env:CLEAN_PWSH_ENV
          vswhere -version '[17.0,18.0)'

      - name: Extract plugin buildspec
        id: buildspec
        uses: ./.github/actions/extract-buildspec

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ inputs.vcpkg-version }}
          persist-credentials: false
          path: ${{ env.ROOT_VCPKG_ROOT }}

      - name: Run bootstrap-vcpkg.bat
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
          VCPKG_ROOT: '${{ env.ROOT_VCPKG_ROOT }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          $bootstrapVcpkgPath = "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"
          & $bootstrapVcpkgPath -disableMetrics

      - name: Install dependencies from vcpkg (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
          VCPKG_BINARY_SOURCES: '${{ inputs.VCPKG_BINARY_SOURCES }}'
          VCPKG_ROOT: '${{ env.ROOT_VCPKG_ROOT }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          $vcpkgPath = "$env:VCPKG_ROOT\vcpkg.exe"
          & $vcpkgPath install --x-install-root=.\.deps_vendor\vcpkg_installed --triplet=x64-windows-static-md-obs

      - name: Download dependencies (Windows)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          cmake -P ./scripts/download_deps.cmake

      - name: Build libobs (Windows)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          ./scripts/build_libobs_windows.ps1

      - name: Compute Toolchain Hash of ONNX Runtime (Windows x64)
        id: ort-toolchain
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          HASH: ${{ hashFiles('src/required_operators_and_types.with_runtime_opt.config', 'scripts/build_ort_windows.ps1', 'scripts/ort_patches/*.patch') }}
        run: |
          echo "HASH=$HASH" >> "$GITHUB_OUTPUT"

      - name: Restore ONNX Runtime ccache generated by ORT CI (Windows x64)
        id: restore-ort-ccache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.ORT_CCACHE_DIR }}
          key: ort-ccache-${{ runner.os }}-x64-${{ steps.image-metadata.outputs.ImageVersion }}-${{ steps.ort-toolchain.outputs.HASH }}-${{ steps.setup-ccache.outputs.VERSION }}
          restore-keys: |
            ort-ccache-${{ runner.os }}-x64-${{ steps.image-metadata.outputs.ImageVersion }}-${{ steps.ort-toolchain.outputs.HASH }}-
            ort-ccache-${{ runner.os }}-x64-${{ steps.image-metadata.outputs.ImageVersion }}-

      - name: Checkout ONNX Runtime
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/onnxruntime
          ref: ${{ inputs.ort-version }}
          persist-credentials: false
          path: .deps_vendor/onnxruntime
          submodules: recursive

      - name: Patch ONNX Runtime
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        working-directory: .deps_vendor/onnxruntime
        env:
          GIT_CONFIG_PARAMETERS: "'user.name=github-actions[bot]' 'user.email=41898282+github-actions[bot]@users.noreply.github.com'"
        run: |
          patches=(../../scripts/ort_patches/*.patch)
          if [[ "${#patches[@]}" -gt 0 ]]; then
            git am --no-gpg-sign --3way "${patches[@]}"
          fi

      - name: Build ONNX Runtime (Windows x64)
        shell: pwsh
        env:
          CCACHE_BASEDIR: '${{ github.workspace }}'
          CCACHE_COMPILERCHECK: 'content'
          CCACHE_COMPRESS: 'true'
          CCACHE_DIR: '${{ env.ORT_CCACHE_DIR }}'
          CCACHE_DIRECT: 'true'
          CCACHE_NODEPEND: 'true'
          CCACHE_SLOPPINESS: 'include_file_ctime,include_file_mtime,time_macros,pch_defines'
          PATH: '${{ env.FILTERED_PATH }}'
          VCPKG_BINARY_SOURCES: '${{ inputs.VCPKG_BINARY_SOURCES }}'
          # Do not set VCPKG_ROOT. Let it manage by ONNX Runtime itself.
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          ./scripts/build_ort_windows.ps1 setup_ccache
          ./scripts/build_ort_windows.ps1 run_build_py x64 update
          ./scripts/build_ort_windows.ps1 run_build_py x64 build
          ./scripts/build_ort_windows.ps1 install_ort

      - name: Upload Ort Binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.buildspec.outputs.NAME }}-ortbinary-windows-x64-${{ github.run_id }}
          path: |
            .deps_vendor/ort_x64-prefix
          if-no-files-found: error
          retention-days: 7

      - name: Show ccache stats for ONNX Runtime
        if: always()
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          CCACHE_DIR: '${{ env.ORT_CCACHE_DIR }}'
        continue-on-error: true
        run: |
          printf '## Ccache stats for ONNX Runtime\n\n```\n%s```\n' "$(ccache -s)" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          cmake --preset windows-ci-x64

      - name: Build (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          cmake --build --preset windows-ci-x64

      - name: Package (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          ./scripts/package_plugin_windows.ps1 -Target x64

      - name: Upload Plugin Binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.buildspec.outputs.NAME }}-pluginbinary-windows-x64-${{ github.run_id }}
          path: |
            release/*-windows-x64.zip
            release/*-windows-x64-pdb.zip
          if-no-files-found: error
          retention-days: 7

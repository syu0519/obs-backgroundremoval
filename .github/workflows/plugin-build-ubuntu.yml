# author: Kaito Udagawa <umireon@kaito.tokyo>
# version: 1.1.0
# date: 2026-04-04

on:
  workflow_call:
    inputs:
      environment:
        description: The environment name for the build jobs, or empty string for no environment
        required: false
        type: string
        default: ''
      VCPKG_BINARY_SOURCES:
        description: VCPKG_BINARY_SOURCES environment variable for the build jobs
        required: true
        type: string
      vcpkg-version:
        description: The version of vcpkg to clone.
        required: true
        type: string
      ort-version:
        description: The ONNX Runtime version.
        required: true
        type: string

permissions: {}

jobs:
  build-ubuntu-x86_64:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    permissions:
      contents: read

    env:
      CLEAN_BASH_ENV: '${{ github.workspace }}/.github/scripts/clean-env-ubuntu.bash'
      FILTERED_PATH: '/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin'
      ORT_CCACHE_DIR: '${{ github.workspace }}/.ort_ccache'
      ROOT_VCPKG_ROOT: '${{ github.workspace }}/vcpkg'
      VCPKG_BINARY_SOURCES: '${{ inputs.VCPKG_BINARY_SOURCES }}'

    steps:
      - name: Output Image Metadata
        id: image-metadata
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          echo "ImageVersion=$ImageVersion" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract plugin buildspec
        id: buildspec
        uses: ./.github/actions/extract-buildspec

      - name: Set up Python for build requirements
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
          pip-install: -r requirements-build.txt

      # ASSERT: The directory of python3 executable is prepended to the PATH even if PATH is overridden in the env section.

      - name: Set up ccache
        id: setup-ccache
        uses: ./.github/actions/setup-ccache

      # ASSERT: The directory of ccache executable is prepended to the PATH even if PATH is overridden in the env section.

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ inputs.vcpkg-version }}
          persist-credentials: false
          path: ${{ env.ROOT_VCPKG_ROOT }}

      - name: Run bootstrap-vcpkg.sh
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          PATH: '${{ env.FILTERED_PATH }}'
          VCPKG_ROOT: '${{ env.ROOT_VCPKG_ROOT }}'
        run: |
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Install dependencies from apt (Ubuntu x86_64)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          APT_PACKAGES=(
            libgles2-mesa-dev
            libqt6svg6-dev
            libsimde-dev
            obs-studio
            qt6-base-dev
            qt6-base-private-dev
          )
          echo "man-db man-db/auto-update boolean false" | sudo debconf-set-selections
          sudo apt-get remove --purge -y man-db
          sudo add-apt-repository -y ppa:obsproject/obs-studio
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends "${APT_PACKAGES[@]}"

      - name: Install dependencies from vcpkg (Ubuntu x86_64)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          PATH: '${{ env.FILTERED_PATH }}'
          VCPKG_ROOT: '${{ env.ROOT_VCPKG_ROOT }}'
        run: |
          "$VCPKG_ROOT/vcpkg" install --x-install-root=./.deps_vendor/vcpkg_installed --triplet=x64-linux-obs

      - name: Compute Toolchain Hash of ONNX Runtime (Ubuntu x86_64)
        id: ort-toolchain
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          HASH: ${{ hashFiles('src/required_operators_and_types.with_runtime_opt.config', 'scripts/build_ort_ubuntu.sh', 'scripts/ort_patches/*.patch') }}
        run: |
          echo "HASH=$HASH" >> "$GITHUB_OUTPUT"

      - name: Restore ONNX Runtime ccache generated by ORT CI (Ubuntu x86_64)
        id: restore-ort-ccache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.ORT_CCACHE_DIR }}
          key: ort-ccache-${{ runner.os }}-x86_64-${{ steps.image-metadata.outputs.ImageVersion }}-${{ steps.ort-toolchain.outputs.HASH }}-${{ steps.setup-ccache.outputs.VERSION }}
          restore-keys: |
            ort-ccache-${{ runner.os }}-x86_64-${{ steps.image-metadata.outputs.ImageVersion }}-${{ steps.ort-toolchain.outputs.HASH }}-
            ort-ccache-${{ runner.os }}-x86_64-${{ steps.image-metadata.outputs.ImageVersion }}-

      - name: Checkout ONNX Runtime
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/onnxruntime
          ref: ${{ inputs.ort-version }}
          persist-credentials: false
          path: .deps_vendor/onnxruntime
          submodules: recursive

      - name: Patch ONNX Runtime
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        working-directory: .deps_vendor/onnxruntime
        env:
          GIT_CONFIG_PARAMETERS: "'user.name=github-actions[bot]' 'user.email=41898282+github-actions[bot]@users.noreply.github.com'"
        run: |
          patches=(../../scripts/ort_patches/*.patch)
          if [[ "${#patches[@]}" -gt 0 ]]; then
            git am --no-gpg-sign --3way "${patches[@]}"
          fi

      - name: Build ONNX Runtime (Ubuntu x86_64)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          CCACHE_BASEDIR: '${{ github.workspace }}'
          CCACHE_COMPILERCHECK: 'content'
          CCACHE_COMPRESS: 'true'
          CCACHE_DEPEND: 'true'
          CCACHE_DIR: '${{ env.ORT_CCACHE_DIR }}'
          CCACHE_DIRECT: 'true'
          CCACHE_SLOPPINESS: 'include_file_ctime,include_file_mtime,time_macros,pch_defines'
          PATH: '${{ env.FILTERED_PATH }}'
          VCPKG_BINARY_SOURCES: '${{ inputs.VCPKG_BINARY_SOURCES }}'
          # Do not set VCPKG_ROOT. Let it manage by ONNX Runtime itself.
        run: |
          ./scripts/build_ort_ubuntu.sh run_build_py x86_64 update
          ./scripts/build_ort_ubuntu.sh run_build_py x86_64 build
          ./scripts/build_ort_ubuntu.sh install_ort

      - name: Show ccache stats for ONNX Runtime
        if: always()
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          CCACHE_DIR: '${{ env.ORT_CCACHE_DIR }}'
        continue-on-error: true
        run: |
          printf '## Ccache stats for ONNX Runtime\n\n```\n%s```\n' "$(ccache -s)" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure (Ubuntu x86_64)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          cmake --preset ubuntu-ci-x86_64

      - name: Build (Ubuntu x86_64)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          cmake --build --preset ubuntu-ci-x86_64

      - name: Package (Ubuntu x86_64)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          PATH: '${{ env.FILTERED_PATH }}'
        working-directory: build_x86_64
        run: |
          cpack -G DEB

      - name: Upload Plugin Binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.buildspec.outputs.NAME }}-pluginbinary-${{ runner.os }}-x86_64-${{ github.run_id }}
          path: |
            release/*-x86_64-linux-gnu.deb
            release/*-x86_64-linux-gnu-dbgsym.ddeb
          if-no-files-found: error
          retention-days: 7

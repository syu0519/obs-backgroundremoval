# file: .github/workflows/ort-build-macos.yml
# author: Kaito Udagawa <umireon@kaito.tokyo>
# version: 1.1.0
# date: 2026-04-04

on:
  workflow_call:
    inputs:
      VCPKG_BINARY_SOURCES:
        description: VCPKG_BINARY_SOURCES environment variable for the build jobs.
        required: true
        type: string
      ort-version:
        description: The ONNX Runtime version.
        required: true
        type: string

permissions: {}

jobs:
  build-macos-universal:
    runs-on: macos-15
    timeout-minutes: 180

    permissions:
      contents: read

    env:
      CLEAN_BASH_ENV: '${{ github.workspace }}/.github/scripts/clean-env-macos.bash'
      DEVELOPER_DIR: '/Applications/Xcode_16.4.app'
      FILTERED_PATH: '/opt/homebrew/opt/xcbeautify/bin:/opt/homebrew/opt/ninja/bin:/opt/homebrew/opt/cmake/bin:/opt/homebrew/opt/curl/bin:/opt/homebrew/opt/wget/bin:/usr/bin:/bin:/usr/sbin:/sbin'
      ORT_CCACHE_DIR: '${{ github.workspace }}/.ort_ccache'
      ORT_CCACHE_LOGFILE: '${{ github.workspace }}/ort_ccache.log'

    steps:
      - name: Output Image Metadata
        id: image-metadata
        shell: bash
        run: |
          echo "ImageVersion=$ImageVersion" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python for build requirements
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
          pip-install: -r requirements-build.txt

      # ASSERT: The directory of python3 executable is prepended to the PATH even if PATH is overridden in the env section.

      - name: Set up ccache
        id: setup-ccache
        uses: ./.github/actions/setup-ccache

      # ASSERT: The directory of ccache executable is prepended to the PATH even if PATH is overridden in the env section.

      - name: Compute Toolchain Hash of ONNX Runtime (macOS universal)
        id: ort-toolchain
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          HASH: ${{ hashFiles('src/required_operators_and_types.with_runtime_opt.config', 'scripts/build_ort_macos.sh', 'scripts/lipo_vcpkg_macos.sh', 'scripts/ort_patches/*.patch') }}
        run: |
          echo "HASH=$HASH" >> "$GITHUB_OUTPUT"

      - name: Restore ONNX Runtime ccache generated by ORT CI (macOS universal)
        id: restore-ort-ccache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.ORT_CCACHE_DIR }}
          key: ort-ccache-${{ runner.os }}-universal-${{ steps.image-metadata.outputs.ImageVersion }}-${{ steps.ort-toolchain.outputs.HASH }}-${{ steps.setup-ccache.outputs.VERSION }}
          restore-keys: |
            ort-ccache-${{ runner.os }}-universal-${{ steps.image-metadata.outputs.ImageVersion }}-${{ steps.ort-toolchain.outputs.HASH }}-
            ort-ccache-${{ runner.os }}-universal-${{ steps.image-metadata.outputs.ImageVersion }}-

      - name: Checkout ONNX Runtime
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/onnxruntime
          ref: ${{ inputs.ort-version }}
          persist-credentials: false
          path: .deps_vendor/onnxruntime
          submodules: recursive

      - name: Patch ONNX Runtime
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        working-directory: .deps_vendor/onnxruntime
        env:
          GIT_CONFIG_PARAMETERS: "'user.name=github-actions[bot]' 'user.email=41898282+github-actions[bot]@users.noreply.github.com'"
        run: |
          patches=(../../scripts/ort_patches/*.patch)
          if [[ "${#patches[@]}" -gt 0 ]]; then
            git am --no-gpg-sign --3way "${patches[@]}"
          fi

      - name: Build ONNX Runtime (macOS universal)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          CCACHE_BASEDIR: '${{ github.workspace }}'
          CCACHE_COMPILERCHECK: 'content'
          CCACHE_COMPRESS: 'true'
          CCACHE_DEPEND: 'true'
          CCACHE_DIR: '${{ env.ORT_CCACHE_DIR }}'
          CCACHE_DIRECT: 'true'
          CCACHE_SLOPPINESS: 'include_file_ctime,include_file_mtime,time_macros,pch_defines'
          PATH: '${{ env.FILTERED_PATH }}'
          VCPKG_BINARY_SOURCES: '${{ inputs.VCPKG_BINARY_SOURCES }}'
          # Do not set VCPKG_ROOT. Let it manage by ONNX Runtime itself.
        run: |
          ./scripts/build_ort_macos.sh run_build_py arm64 update
          ./scripts/build_ort_macos.sh run_build_py x86_64 update
          ./scripts/build_ort_macos.sh run_build_py arm64 build | xcbeautify
          ./scripts/build_ort_macos.sh run_build_py x86_64 build | xcbeautify
          ./scripts/build_ort_macos.sh install_ort

      - name: Show ccache stats for ONNX Runtime
        if: always()
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          CCACHE_DIR: '${{ env.ORT_CCACHE_DIR }}'
        continue-on-error: true
        run: |
          printf '## Ccache stats for ONNX Runtime\n\n```\n%s```\n' "$(ccache -s)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload ORT ccache log (macOS universal)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ort-ccache-log-${{ runner.os }}-universal
          path: ${{ env.ORT_CCACHE_LOGFILE }}
          if-no-files-found: warn
          retention-days: 7

      - name: Save ORT ccache
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ env.ORT_CCACHE_DIR }}
          key: ${{ steps.restore-ort-ccache.outputs.cache-primary-key }}

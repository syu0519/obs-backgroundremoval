name: Plugin CI
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['*']
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-windows:
    permissions:
      contents: read
    uses: ./.github/workflows/plugin-build-windows.yml
    with:
      VCPKG_BINARY_SOURCES: 'clear;http,https://vcpkg-obs.kaito.tokyo/{name}/{version}/{sha}'
      vcpkg-version: '2025.08.27'
      ort-version: v1.24.4
  accept-plugin:
    name: Accept Plugin CI
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Accept plugin
        run: |
          echo 'The workflow plugin has completed successfully.'
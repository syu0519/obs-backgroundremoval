# author: Kaito Udagawa <umireon@kaito.tokyo>
# version: 1.0.0
# date: 2026-03-30

on:
  workflow_call:
    inputs:
      codesign-enabled:
        description: Whether to enable code signing and notarization steps
        required: true
        type: boolean
      environment:
        description: The environment name for the build jobs, or empty string for no environment
        required: false
        type: string
        default: ''
      pluginbinary-retention-days:
        description: Days to retain plugin binary artifacts in GitHub Actions
        required: false
        type: number
        default: 7
      VCPKG_BINARY_SOURCES:
        description: VCPKG_BINARY_SOURCES environment variable for the build jobs
        required: false
        type: string
        default: ''
    secrets:
      MACOS_NOTARIZATION_PASSWORD:
        required: false
      MACOS_NOTARIZATION_USERNAME:
        required: false
      MACOS_SIGNING_APPLICATION_IDENTITY:
        required: false
      MACOS_SIGNING_CERT_PASSWORD:
        required: false
      MACOS_SIGNING_CERT:
        required: false
      MACOS_SIGNING_INSTALLER_IDENTITY:
        required: false

jobs:
  build-macos-universal:
    name: Build Plugin for macOS universal

    environment: ${{ inputs.environment }}
    runs-on: macos-15
    timeout-minutes: 180

    permissions:
      contents: read

    env:
      CLEAN_BASH_ENV: '${{ github.workspace }}/.github/scripts/clean-env-macos.bash'
      CMAKE_PATH: '/opt/homebrew/opt/cmake/bin'
      CREDENTIAL_GIT_CONFIG_PARAMETERS: "'url.https://x-access-token:${{ github.token }}@github.com/.insteadOf=https://github.com/'"
      DEVELOPER_DIR: '/Applications/Xcode_16.4.app'
      MINIMAL_PATH: '/opt/homebrew/opt/curl/bin:/opt/homebrew/opt/wget/bin:/usr/bin:/bin:/usr/sbin:/sbin'
      ORT_CCACHE_DIR: '${{ github.workspace }}/.ort_ccache'
      VCPKG_BINARY_SOURCES: '${{ inputs.VCPKG_BINARY_SOURCES }}'
      VCPKG_ROOT: '${{ github.workspace }}/vcpkg'
      XCBEAUTIFY_PATH: '/opt/homebrew/opt/xcbeautify/bin'

    steps:
      - name: Output Image Metadata
        id: image-metadata
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: echo "ImageVersion=$ImageVersion" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract plugin buildspec
        id: buildspec
        uses: ./.github/actions/extract-buildspec

      - name: Extract vcpkg configuration
        id: vcpkg-configuration
        uses: ./.github/actions/extract-vcpkg-configuration

      - name: Set up Python for build requirements
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ${{ github.workspace }}/.python-version
          pip-install: -r ${{ github.workspace }}/requirements-build.txt

      - name: Set up ccache
        id: setup-ccache
        uses: ./.github/actions/setup-ccache

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ steps.vcpkg-configuration.outputs.DEFAULT_REGISTRY_BASELINE }}
          persist-credentials: false
          path: ${{ env.VCPKG_ROOT }}
          filter: "blob:none"

      - name: Run bootstrap-vcpkg.sh
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          GIT_CONFIG_PARAMETERS: '${{ env.CREDENTIAL_GIT_CONFIG_PARAMETERS }}'
          PATH: '${{ env.MINIMAL_PATH }}'
        run: |
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Install dependencies from vcpkg (macOS arm64)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          GIT_CONFIG_PARAMETERS: '${{ env.CREDENTIAL_GIT_CONFIG_PARAMETERS }}'
          PATH: '${{ env.CMAKE_PATH }}:${{ env.MINIMAL_PATH }}'
        run: |
          "$VCPKG_ROOT/vcpkg" install --x-install-root=./.deps_vendor/vcpkg_installed_arm64 --triplet=arm64-osx-obs

      - name: Install dependencies from vcpkg (macOS x64)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          GIT_CONFIG_PARAMETERS: '${{ env.CREDENTIAL_GIT_CONFIG_PARAMETERS }}'
          PATH: '${{ env.CMAKE_PATH }}:${{ env.MINIMAL_PATH }}'
        run: |
          "$VCPKG_ROOT/vcpkg" install --x-install-root=./.deps_vendor/vcpkg_installed_x64 --triplet=x64-osx-obs

      - name: Lipo vcpkg (macOS)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          PATH: '${{ env.MINIMAL_PATH }}'
        run: |
          ./scripts/lipo_vcpkg_macos.sh ./.deps_vendor/vcpkg_installed_arm64/arm64-osx-obs ./.deps_vendor/vcpkg_installed_x64/x64-osx-obs ./.deps_vendor/vcpkg_installed/universal-osx-obs

      - name: Download dependencies (macOS)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          PATH: '${{ env.CMAKE_PATH }}:${{ env.MINIMAL_PATH }}'
        run: |
          cmake -P ./scripts/download_deps.cmake

      - name: Build libobs (macOS universal)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          GIT_CONFIG_PARAMETERS: '${{ env.CREDENTIAL_GIT_CONFIG_PARAMETERS }}'
          PATH: '${{ env.XCBEAUTIFY_PATH }}:${{ env.CMAKE_PATH }}:${{ env.MINIMAL_PATH }}'
        run: |
          ./scripts/build_libobs_macos.sh

      - name: Compute Toolchain Hash of ONNX Runtime (macOS universal)
        id: ort-toolchain
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          HASH: ${{ hashFiles('data/models/required_operators_and_types.with_runtime_opt.config', 'scripts/build_ort_macos.sh', 'scripts/lipo_vcpkg_macos.sh') }}
        run: |
          echo "HASH=$HASH" >> "$GITHUB_OUTPUT"

      - name: Restore ONNX Runtime ccache generated by ORT CI (macOS universal)
        id: restore-ort-ccache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.ORT_CCACHE_DIR }}
          key: ort-ccache-${{ runner.os }}-universal-${{ steps.image-metadata.outputs.ImageVersion }}-${{ steps.ort-toolchain.outputs.HASH }}-${{ steps.setup-ccache.outputs.VERSION }}
          restore-keys: |
            ort-ccache-${{ runner.os }}-universal-${{ steps.image-metadata.outputs.ImageVersion }}-${{ steps.ort-toolchain.outputs.HASH }}-
            ort-ccache-${{ runner.os }}-universal-${{ steps.image-metadata.outputs.ImageVersion }}-

      - name: Build ONNX Runtime (macOS universal)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          CCACHE_BASEDIR: '${{ github.workspace }}'
          CCACHE_COMPILERCHECK: 'content'
          CCACHE_COMPRESS: 'true'
          CCACHE_DEPEND: 'true'
          CCACHE_DIR: '${{ env.ORT_CCACHE_DIR }}'
          CCACHE_DIRECT: 'true'
          CCACHE_SLOPPINESS: 'include_file_ctime,include_file_mtime,time_macros,pch_defines'
          PATH: '${{ env.XCBEAUTIFY_PATH }}:${{ env.CMAKE_PATH }}:${{ env.MINIMAL_PATH }}'
        run: |
          ./scripts/build_ort_macos.sh

      - name: Show ccache stats for ONNX Runtime
        if: always()
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          CCACHE_DIR: '${{ env.ORT_CCACHE_DIR }}'
        continue-on-error: true
        run: |
          printf '## Ccache stats for ONNX Runtime\n\n```\n%s```\n' "$(ccache -s)" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure (macOS universal)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          PATH: '${{ env.CMAKE_PATH }}:${{ env.MINIMAL_PATH }}'
        run: |
          cmake --preset macos-ci

      - name: Build (macOS universal)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          PATH: '${{ env.XCBEAUTIFY_PATH }}:${{ env.CMAKE_PATH }}:${{ env.MINIMAL_PATH }}'
        run: |
          cmake --build --preset macos-ci | tee ./Build.txt | xcbeautify

      - name: Set up macOS Signing Certificates
        if: ${{ inputs.codesign-enabled }}
        id: codesign
        uses: ./.github/actions/setup-macos-codesigning
        with:
          MACOS_SIGNING_APPLICATION_IDENTITY: ${{ secrets.MACOS_SIGNING_APPLICATION_IDENTITY }}
          MACOS_SIGNING_CERT: ${{ secrets.MACOS_SIGNING_CERT }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}

      - name: Package (macOS universal)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          PATH: '${{ env.CMAKE_PATH }}:${{ env.MINIMAL_PATH }}'
          PLUGIN_BUNDLE_ID: '${{ steps.buildspec.outputs.BUNDLE_ID }}'
          PLUGIN_CODESIGN_ENABLED: ${{ inputs.codesign-enabled && 'true' || 'false' }}
          PLUGIN_DISPLAY_NAME: '${{ steps.buildspec.outputs.DISPLAY_NAME }}'
          PLUGIN_MACOS_SIGNING_APPLICATION_IDENTITY: '${{ secrets.MACOS_SIGNING_APPLICATION_IDENTITY }}'
          PLUGIN_MACOS_SIGNING_INSTALLER_IDENTITY: '${{ secrets.MACOS_SIGNING_INSTALLER_IDENTITY }}'
          PLUGIN_NAME: '${{ steps.buildspec.outputs.NAME }}'
          PLUGIN_VERSION: '${{ steps.buildspec.outputs.VERSION }}'
        run: |
          cmake --install build_macos --config RelWithDebInfo --strip \
            --prefix ./release/payload/Library/Application\ Support/obs-studio/plugins

          PLUGIN_BUNDLE=(./release/payload/Library/Application\ Support/obs-studio/plugins/*.plugin)

          if [[ "${#PLUGIN_BUNDLE[@]}" -ne 1 ]]; then
            echo "Error: PLUGIN_BUNDLE = ${PLUGIN_BUNDLE[@]}"
            exit 1
          fi

          if [[ "$PLUGIN_CODESIGN_ENABLED" == true ]]; then
            codesign --sign "$PLUGIN_MACOS_SIGNING_APPLICATION_IDENTITY" --force --deep --options runtime --timestamp "${PLUGIN_BUNDLE[0]}"
          fi

          pkgbuild --root ./release/payload --identifier "$PLUGIN_BUNDLE_ID" --version "$PLUGIN_VERSION" ./release/component.pkg

          {
            printf '<?xml version="1.0" encoding="utf-8"?>\n'
            printf '<installer-gui-script minSpecVersion="2">\n'
            printf '  <title>%s</title>\n' "$PLUGIN_DISPLAY_NAME"
            printf '  <options customize="never" require-scripts="false" hostArchitectures="x86_64,arm64"/>\n'
            printf '  <domains enable_localSystem="false" enable_currentUserHome="true" enable_anywhere="false"/>\n'
            printf '  <choices-outline>\n'
            printf '    <line choice="default"/>\n'
            printf '  </choices-outline>\n'
            printf '  <choice id="default" title="%s" visible="false">\n' "$PLUGIN_DISPLAY_NAME"
            printf '    <pkg-ref id="%s"/>\n' "$PLUGIN_BUNDLE_ID"
            printf '  </choice>\n'
            printf '  <pkg-ref id="%s" version="%s" onConclusion="none" auth="none">component.pkg</pkg-ref>\n' "$PLUGIN_BUNDLE_ID" "$PLUGIN_VERSION"
            printf '</installer-gui-script>\n'
          } | tee ./release/distribution.xml

          PRODUCTBUILD_ARGS=(
            --distribution release/distribution.xml
            --package-path release
          )

          if [[ "$PLUGIN_CODESIGN_ENABLED" == true ]]; then
            PRODUCTBUILD_ARGS+=(--sign "$PLUGIN_MACOS_SIGNING_INSTALLER_IDENTITY")
          fi

          productbuild "${PRODUCTBUILD_ARGS[@]}" "./release/$PLUGIN_NAME-$PLUGIN_VERSION-macos-universal.pkg"

      - name: Notarize Installer
        if: ${{ inputs.codesign-enabled }}
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: ${{ env.CLEAN_BASH_ENV }}
          PATH: "${{ env.MINIMAL_PATH }}"
          PLUGIN_CODESIGN_TEAM: ${{ steps.codesign.outputs.CODESIGN_TEAM }}
          PLUGIN_MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          PLUGIN_MACOS_NOTARIZATION_USERNAME: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
        run: |
          xcrun notarytool submit ./release/*-macos-universal.pkg \
            --apple-id "$PLUGIN_MACOS_NOTARIZATION_USERNAME" \
            --password "$PLUGIN_MACOS_NOTARIZATION_PASSWORD" \
            --team-id "$PLUGIN_CODESIGN_TEAM" \
            --wait

          xcrun stapler staple ./release/*-macos-universal.pkg

      - name: Archive Plugin dSYM
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        working-directory: ${{ github.workspace }}/build_macos/RelWithDebInfo
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          PLUGIN_NAME: '${{ steps.buildspec.outputs.NAME }}'
          PLUGIN_VERSION: '${{ steps.buildspec.outputs.VERSION }}'
          PATH: '${{ env.MINIMAL_PATH }}'
        run: |
          tar -cJf "$GITHUB_WORKSPACE/release/$PLUGIN_NAME-$PLUGIN_VERSION-macos-universal.dSYM.tar.xz" "$PLUGIN_NAME.plugin.dSYM"

      - name: Upload Plugin Binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.buildspec.outputs.NAME }}-pluginbinary-${{ runner.os }}-universal-${{ github.run_id }}
          path: |
            release/*-macos-universal.pkg
            release/*-macos-universal.dSYM.tar.xz
          if-no-files-found: error
          retention-days: ${{ inputs.pluginbinary-retention-days }}

      - name: Upload Logs
        if: always() && runner.debug == '1'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: logs-plugin-${{ runner.os }}-${{ github.run_id }}
          path: Build.txt
          if-no-files-found: warn

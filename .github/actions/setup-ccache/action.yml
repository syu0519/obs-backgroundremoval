name: Set up ccache
description: Set up ccache for macOS, Ubuntu, and Windows
inputs:
  version:
    description: Version of ccache to install.
    required: true
  verify:
    description: Whether to verify downloaded ccache.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Install ccache
      id: install
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_VERIFY: ${{ inputs.verify }}
      run: |
        set -euo pipefail

        case "$RUNNER_OS" in
          macOS) FILE="ccache-$INPUT_VERSION-darwin.tar.gz" ;;
          Linux) FILE="ccache-$INPUT_VERSION-linux-x86_64.tar.xz" ;;
          Windows) FILE="ccache-$INPUT_VERSION-windows-x86_64.zip" ;;
        esac

        DOWNLOAD_DIR="$RUNNER_TEMP/setup-ccache-download"
        BIN_DIR="$RUNNER_TEMP/setup-ccache-bin"
        mkdir -p "$DOWNLOAD_DIR" "$BIN_DIR"

        cd "$DOWNLOAD_DIR"
        curl -fsSLO "https://github.com/ccache/ccache/releases/download/v$INPUT_VERSION/$FILE"

        if [[ "$INPUT_VERIFY" == true ]]; then
          grep "$FILE" "$GITHUB_ACTION_PATH/SHA256SUMS-$INPUT_VERSION.txt" | tr -d '\r' > checksum.txt
          if ! sha256sum -c checksum.txt; then
            exit 1
          fi
        fi

        if [[ "$RUNNER_OS" == Windows ]]; then
          unzip -o "$FILE"
          cp ccache-*/ccache.exe "$BIN_DIR/ccache.exe"
          cygpath -w "$BIN_DIR" >> "$GITHUB_PATH"
        else
          tar -xf "$FILE"
          cp ccache-*/ccache "$BIN_DIR/"
          chmod +x "$BIN_DIR/ccache" || true
          echo "$BIN_DIR" >> "$GITHUB_PATH"
        fi

    - name: Show Ccache version
      shell: bash
      run: ccache --version
